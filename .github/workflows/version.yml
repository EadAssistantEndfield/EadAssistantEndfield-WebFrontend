name: Auto Bump Version

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'CHANGELOG.md'
      - 'README.md'
      - 'coverage/**'
      - 'docs/**'
      - 'package-lock.json'
      - 'package.json'
      - 'public/version.json'
      - 'tests/**'
  workflow_dispatch:

concurrency:
  group: version-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  auto-bump-version:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup npm
        run: npm install -g npm@11.16.0

      - name: Install dependencies
        run: npm ci

      - name: Bump version
        id: bump_version
        run: npm run version:bump

      - name: Commit and push version files
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json package-lock.json CHANGELOG.md public/version.json
          if git diff --cached --quiet; then
            echo "No version changes to commit"
            exit 0
          fi
          git commit -m "chore(version): bump version to v${{ steps.bump_version.outputs.new_version }} [skip ci]"
          git push origin HEAD:main
